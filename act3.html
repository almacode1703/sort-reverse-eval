<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
</head>
<body>
         <form action="">
            <input type="text" name="" id="palindrome" placeholder="Enter a word" required>
            <button onclick="checkPalindrome(event)">Check</button>
         </form>
         <p id="demo"></p>      

         <script>

           function checkPalindrome(event) {
               event.preventDefault();
               let word = document.getElementById("palindrome").value;

               word = word.toLowerCase().replace(/[^a-z0-9]/g, '');

               let reversedWord = word.split("").reverse().join("");
               if (word === reversedWord) {
                   document.getElementById("demo").innerHTML = word + " is a palindrome.";
                   document.getElementById("demo").style.color = "green";
               } else {
                   document.getElementById("demo").innerHTML = word + " is not a palindrome.";
                   document.getElementById("demo").style.color = "red";
               }
           }


         </script>

</body>
</html>
